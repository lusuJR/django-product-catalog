{% extends 'base.html' %}

{% block content %}

<div class="profile-page">

    <h1 class="profile-title">Change Password</h1>

    <p class="breadcrumb-text">
        Home › My Profile › Change Password
    </p>

    <div class="profile-layout">

        {% include 'products/profile_sidebar.html' %}

        <section class="profile-main-card">

            <h2>
                <i class="fa-solid fa-lock"></i>
                Change Password
            </h2>

            <p class="section-subtitle">
                Update your account password securely.
            </p>

            <form method="POST" class="password-form">

                {% csrf_token %}

                <div class="form-group">

                    <label>Current Password</label>

                    <input type="password"
                        name="old_password"
                        class="form-control"
                        required>

                </div>

                <div class="form-group">

                    <label>New Password</label>

                    <input type="password"
                        name="new_password1"
                        class="form-control"
                        required>

                </div>

                <div class="form-group">

                    <label>Confirm New Password</label>

                    <input type="password"
                        name="new_password2"
                        class="form-control"
                        required>

                </div>

                <button type="submit" class="review-btn">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Update Password

                </button>

            </form>

        </section>

    </div>

</div>

{% endblock %}
