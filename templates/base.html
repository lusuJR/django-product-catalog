{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amina Store</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet"
          href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar">
    <div class="container-fluid navbar-container">
        <a class="navbar-brand" href="/">Amina Store</a>

        <div class="navbar-links">
            <a href="/">Home</a>
            <a href="#">Categories</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>

        <form class="search-form">
            <input class="form-control" type="search" placeholder="Search products">
            <button class="btn btn-light" type="submit">Search</button>
        </form>
    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>
<footer class="footer">
    <div class="container">
        <p>
            © 2026 Amina Store | Powered by Django & Python
        </p>
    </div>
</footer>
</body>
</html>
