<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Product Catalogue</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
        background: #f5f7fb;
        font-family: 'Segoe UI', sans-serif;
    }

    .navbar{
        background: linear-gradient(90deg,#0f172a,#1e293b);
        padding: 15px 0;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .navbar-brand{
        color:white !important;
        font-size:1.7rem;
        font-weight:700;
        letter-spacing:1px;
    }

    h1{
        font-weight:700;
        color:#111827;
    }

    .product-card{
        border:none;
        border-radius:20px;
        overflow:hidden;
        transition:0.3s ease;
        background:white;
    }

    .product-card:hover{
        transform:translateY(-8px);
        box-shadow:0 15px 30px rgba(0,0,0,0.15);
    }

  .product-image{
    width:100%;
    height:280px;
    object-fit:contain;
    background:white;
    padding:15px;
    border-radius:20px 20px 0 0;
}

    .card-body{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.product-card{
    height:100%;
}

    .card-title{
        font-size:1.4rem;
        font-weight:700;
        color:#111827;
    }

    .price{
        font-size:1.3rem;
        font-weight:bold;
        color:#2563eb;
    }

    .btn-dark{
    border-radius:12px;
    padding:12px 20px;
    transition:0.3s ease;
}

.btn-dark:hover{
    transform:scale(1.03);
}

    .category-badge{
        display:inline-block;
        background:#dbeafe;
        color:#1d4ed8;
        padding:5px 12px;
        border-radius:30px;
        font-size:0.9rem;
        margin-bottom:10px;
    }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Amina Store</a>
    </div>
    <form class="d-flex ms-auto">
    <input class="form-control me-2" 
           type="search" 
           placeholder="Search products">

    <button class="btn btn-light">
        Search
    </button>
</form>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>
<footer class="text-center py-4 mt-5">
    <p class="text-muted">
        © 2026 Amina Store | Powered by Django & Python
    </p>
</footer>
</body>
</html>
